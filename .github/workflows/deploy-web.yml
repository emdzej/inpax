name: Deploy inpax-web to GitHub Pages

# Manual-trigger only — same pattern as the sibling ediabasx workflow.
# Click "Run workflow" in the Actions tab to publish main to
# inpax.bimmerz.app.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `...` is the pnpm-filter "package + workspace dependencies"
      # selector — builds inpax-web's own packages before vite runs,
      # but skips the unrelated CLI / compile / ipo-editor trees.
      - name: Build
        run: pnpm --filter @emdzej/inpax-web... build

      - name: Add CNAME
        run: echo "inpax.bimmerz.app" > apps/inpax-web/dist/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/inpax-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
